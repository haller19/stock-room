<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — zaiko</title>
<link rel="preconnect" href="https://exuvgbfyucebhtmfrwek.supabase.co">
<link rel="icon" href="../favicon.ico">
<link rel="manifest" href="../manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="zaiko">
<link rel="apple-touch-icon" sizes="180x180" href="../icons/icon-180.png">
<meta name="theme-color" content="#0aada0">
<style>
  :root {
    --bg:           #f0fafa;
    --surface:      #ffffff;
    --border:       #caeaea;
    --border-dark:  #9dd4d4;
    --text:         #1a2e2e;
    --text-muted:   #6b9090;
    --accent:       #0aada0;
    --accent-light: #e0f7f6;
    --sans: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-size: 14px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 32px 36px;
    width: min(340px, 90vw);
    box-shadow: 0 4px 32px rgba(10,173,160,.10);
    text-align: center;
  }
  .login-card img { height: 36px; width: auto; margin-bottom: 32px; }
  .login-card h2 {
    font-size: 14px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 28px;
    letter-spacing: .04em;
  }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 12px;
    border: 1.5px solid var(--border-dark); border-radius: 8px;
    background: var(--surface); color: var(--text);
    font-family: var(--sans); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btn-google:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-google svg { flex-shrink: 0; }
  .login-note {
    font-size: 11px; color: var(--text-muted);
    margin-top: 20px; line-height: 1.7;
    min-height: 2.4em;
  }
  .login-note.error { color: #e05c5c; }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1f1f; --surface: #152828;
      --border: #1e3a3a; --border-dark: #2a5050;
      --text: #d8f0ee; --text-muted: #5a9090;
      --accent: #2fcfb8; --accent-light: #0d2e2b;
    }
    .btn-google { background: #152828; border-color: #2a5050; }
    .btn-google:hover { background: var(--accent-light); border-color: var(--accent); }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
</head>
<body>

<div class="login-card">
  <img src="../zaiko_header_logo.svg" alt="zaiko">
  <h2>ログインしてください</h2>
  <button class="btn-google" id="btn-login" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Googleアカウントでログイン
  </button>
  <p class="login-note" id="login-note">登録済みのGoogleアカウントのみ<br>アクセスできます</p>
</div>

<script>
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signInWithGoogle() {
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.style.opacity = '.6';
  const redirectTo = window.location.origin + '/stock-room/';
  const { error } = await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo }
  });
  if (error) {
    showNote('ログインエラー: ' + error.message, true);
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

function showNote(msg, isError) {
  const el = document.getElementById('login-note');
  el.textContent = msg;
  el.className = 'login-note' + (isError ? ' error' : '');
}

// すでにログイン済みならindex.htmlへ
(async () => {
  const { data: { session } } = await sbClient.auth.getSession();
  if (session) {
    const email = session.user?.email;
    if (ALLOWED_EMAILS.includes(email)) {
      window.location.replace('/stock-room/');
    } else {
      await sbClient.auth.signOut();
      showNote('このアカウントはアクセスできません。\n別のアカウントでお試しください。', true);
    }
  }
})();
</script>
</body>
</html>
