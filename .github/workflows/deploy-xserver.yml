name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 10022 ${{ secrets.XSERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -vvv -p 10022 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }} exit

      - name: Deploy via rsync
        shell: bash
        run: |
          rsync -avz \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".vscode/" \
            --exclude "node_modules/" \
            -e "ssh -p 10022 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            ./ \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_REMOTE_PATH }}